<dom-module id="paper-ripple" 
assetpath="../bower_components/paper-ripple/"><template>
<STYLE>
      :host {
        display: block;
        position: absolute;
        border-radius: inherit;
        overflow: hidden;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;

        /* See PolymerElements/paper-behaviors/issues/34. On non-Chrome browsers,
         * creating a node (with a position:absolute) in the middle of an event
         * handler "interrupts" that event handler (which happens when the
         * ripple is created on demand) */
        pointer-events: none;
      }

      :host([animating]) {
        /* This resolves a rendering issue in Chrome (as of 40) where the
           ripple is not properly clipped by its parent (which may have
           rounded corners). See: http://jsbin.com/temexa/4

           Note: We only apply this style conditionally. Otherwise, the browser
           will create a new compositing layer for every ripple element on the
           page, and that would be bad. */
        -webkit-transform: translate(0, 0);
        transform: translate3d(0, 0, 0);
      }

      #background,
      #waves,
      .wave-container,
      .wave {
        pointer-events: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #background,
      .wave {
        opacity: 0;
      }

      #waves,
      .wave {
        overflow: hidden;
      }

      .wave-container,
      .wave {
        border-radius: 50%;
      }

      :host(.circle) #background,
      :host(.circle) #waves {
        border-radius: 50%;
      }

      :host(.circle) .wave-container {
        overflow: hidden;
      }
    </STYLE>
     
<DIV id="background"></DIV>

  :root {
    /*
     * You can use these generic variables in your elements for easy theming.
     * For example, if all your elements use `--primary-text-color` as its main

    --primary-text-color: var(--light-theme-text-color);

    --disabled-text-color: var(--light-theme-disabled-color);

    --layout-self-center: {

      -ms-align-content: flex-end;
      -webkit-align-content: flex-end;

    --layout-center-aligned: {

      -ms-align-content: space-around;

    *******************************/

<dom-module id="paper-radio-button" assetpath="../bower_components/paper-radio-button/"> 
  <template strip-whitespace="">
<STYLE>
      :host {
        display: inline-block;
        line-height: 0;
        white-space: nowrap;
        cursor: pointer;
        @apply(--paper-font-common-base);
        --calculated-paper-radio-button-size: var(--paper-radio-button-size, 16px);
        /* -1px is a sentinel for the default and is replace in `attached`. */
        --calculated-paper-radio-button-ink-size: var(--paper-radio-button-ink-size, -1px);
      }

      :host(:focus) {
        outline: none;
      }

      #radioContainer {
        @apply(--layout-inline);
        @apply(--layout-center-center);
        position: relative;
        width: var(--calculated-paper-radio-button-size);
        height: var(--calculated-paper-radio-button-size);
        vertical-align: middle;
      }

      #ink {
        position: absolute;
        top: 50%;
        left: 50%;
        right: auto;
        width: var(--calculated-paper-radio-button-ink-size);
        height: var(--calculated-paper-radio-button-ink-size);
        color: var(--paper-radio-button-unchecked-ink-color, --primary-text-color);
        opacity: 0.6;
        pointer-events: none;
        -webkit-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
      }

      #ink[checked] {
        color: var(--paper-radio-button-checked-ink-color, --primary-color);
      }

      #offRadio, #onRadio {
        position: absolute;
        box-sizing: border-box;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 50%;
      }

      #offRadio {
        border: 2px solid var(--paper-radio-button-unchecked-color, --primary-text-color);
        background-color: var(--paper-radio-button-unchecked-background-color, transparent);
        transition: border-color 0.28s;
      }

      #onRadio {
        background-color: var(--paper-radio-button-checked-color, --primary-color);
        -webkit-transform: scale(0);
        transform: scale(0);
        transition: -webkit-transform ease 0.28s;
        transition: transform ease 0.28s;
        will-change: transform;
      }

      :host([checked]) #offRadio {
        border-color: var(--paper-radio-button-checked-color, --primary-color);
      }

      :host([checked]) #onRadio {
        -webkit-transform: scale(0.5);
        transform: scale(0.5);
      }

      #radioLabel {
        line-height: normal;
        position: relative;
        display: inline-block;
        vertical-align: middle;
        margin-left: var(--paper-radio-button-label-spacing, 10px);
        white-space: normal;
        color: var(--paper-radio-button-label-color, --primary-text-color);
      }

      :host-context([dir="rtl"]) #radioLabel {
        margin-left: 0;
        margin-right: var(--paper-radio-button-label-spacing, 10px);
      }

      #radioLabel[hidden] {
        display: none;
      }

      /* disabled state */

      :host([disabled]) #offRadio {
        border-color: var(--paper-radio-button-unchecked-color, --primary-text-color);
        opacity: 0.5;
      }

      :host([disabled][checked]) #onRadio {
        background-color: var(--paper-radio-button-unchecked-color, --primary-text-color);
        opacity: 0.5;
      }

      :host([disabled]) #radioLabel {
        /* slightly darker than the button, so that it's readable */
        opacity: 0.65;
      }
    </STYLE>

<STYLE>
      ::content pre, ::content code {
        font-family: 'Source Code Pro', Helvetica, Arial;
        font-size: inherit;
        border-radius: 4px;
        overflow-x: auto;
        @apply(--google-codelab-step-code);
      }

      ::content code {
        background-color: #E8EAEd;
        padding: 0.1em 0.3em;
      }

      ::content pre {
        display: block;
        color: white;
        background-color: #28323f;
        padding: 14px;
        -webkit-text-size-adjust: none;
        line-height: 1.4;
      }

      ::content pre > code {
        padding: 0;
        background-color: transparent;
      }

      ::content code em {
        color: #97C8F2;
      }

      ::content pre .str, ::content code .str { color: #34A853; } /* string  - green */
      ::content pre .kwd, ::content code .kwd { color: #F538A0; } /* keyword - dark pink */
      ::content pre .com, ::content code .com { color: #BDC1C6; font-style: italic; } /* comment - gray */
      ::content pre .typ, ::content code .typ { color: #24C1E0; } /* type - light blue */
      ::content pre .lit, ::content code .lit { color: #4285F4; } /* literal - blue */
      ::content pre .pun, ::content code .pun { color: #F8F9FA; } /* punctuation - white */
      ::content pre .pln, ::content code .pln { color: #F8F9FA; } /* plaintext - white */
      ::content pre .tag, ::content code .tag { color: #24C1E0; } /* html/xml tag    - light blue */
      ::content pre .atn, ::content code .atn { color: #EDA912; } /* html/xml attribute name  - khaki */
      ::content pre .atv, ::content code .atv { color: #34A853; } /* html/xml attribute value - green */
      ::content pre .dec, ::content code .dec { color: #5195EA; } /* decimal - blue */

<STYLE>
      :host {
        display: block;
        position: relative;
      }

      :host > ::content > * {
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
      }

      :host > ::content > :not(.iron-selected):not(.neon-animating) {
        display: none !important;
      }

      :host > ::content > .neon-animating {
        pointer-events: none;
      }
    </STYLE>
         <content id="content"></content>   </template> </dom-module> 
<dom-module id="app-header-layout" assetpath="../bower_components/app-layout/app-header-layout/"><template>
<STYLE>
      :host {
        display: block;
        /**
         * Force app-header-layout to have its own stacking context so that its parent can
         * control the stacking of it relative to other elements (e.g. app-drawer-layout).
         * This could be done using `isolation: isolate`, but that's not well supported
         * across browsers.
         */
        position: relative;
        z-index: 0;
      }

      :host > ::content > app-header {
        @apply(--layout-fixed-top);
        z-index: 1;
      }

      :host([has-scrolling-region]) {
        height: 100%;
      }

      :host([has-scrolling-region]) > ::content > app-header {
        position: absolute;
      }

      :host([has-scrolling-region]) > #contentContainer {
        @apply(--layout-fit);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      :host([fullbleed]) {
        @apply(--layout-vertical);
        @apply(--layout-fit);
      }

      :host([fullbleed]) > #contentContainer {
        @apply(--layout-vertical);
        @apply(--layout-flex);
      }

      #contentContainer {
        /* Create a stacking context here so that all children appear below the header. */
        position: relative;
        z-index: 0;
      }

    </STYLE>

  font-weight: 400;

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

paper-icon-button[icon=menu] {
  margin-right: 0 !important;
}

paper-fab {
  --paper-fab-keyboard-focus-background: var(--google-codelab-fab-background, --paper-blue-700);
  --paper-fab-background: var(--google-codelab-fab-background, --paper-blue-700);
  flex-shrink: 0;
}

/* override external styles */
:host([theme="minimal"]) #resumeDialog > * {
  margin-top: 20px;
  padding: 0 24px;
}

:host([theme="minimal"]) #resumeDialog .buttons {
  padding: 8px 8px 8px 24px;
  margin: 0;
}

.countdown iron-icon {
  margin-right: 3px;
}

:host(:not([theme="minimal"])) #drawer .countdown {
  display: none;
}

:host([theme="minimal"]) #drawer .countdown {
  padding: 0 16px 16px 16px;
  font-style: italic;
  color: var(--paper-blue-500);
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
}

#controls {
  position: fixed;
  right: 0;
  bottom: 16px;
  padding: 0 16px;
  width: calc(100% - 256px); /* width of drawer */
  box-sizing: border-box;
  pointer-events: none; /* allow users to scroll */
}

#controls .fabs {
  /* Note: custom props don't work in calc(). */
  max-width: calc(800px + 250px);
  margin: 0 auto;
}

.navbutton {
  border-radius: 4px;
  font-family: 'Google Sans', Arial, sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: .6px;
  padding-bottom: 6px;
  padding-left: 24px;
  padding-right: 24px;
  padding-top: 6px;
  pointer-events: initial; /* make sure buttons are clickable */
  text-transform: none;
}

.navbutton.nextbutton {
  background: var(--google-material-blue-600);
  color: #FFFFFF;
}

.navbutton.prevbutton {
  background: #FFFFFF;
  color: var(--google-material-blue-600);
  transition: transform 300ms ease-in-out;
}

.navbutton.prevbutton[disabled] {
  color: white;
  transform: scale(0);
}

.navbutton.donebutton {
  background: var(--google-material-green-600);
  color: #FFFFFF;
}

#toc {
  /* ensures bottom of nav scrolling meny doesn't overlap with file bug link. */
  margin-bottom: 1.5em;
}

.toc-item {
  font-size: 14px;
  color: var(--google-material-grey-600);
  overflow: hidden;
  border-radius: 4px;
  padding: 6px 16px;
  box-sizing: content-box; /* override users that set * selector box-sizing. */
  line-height: 20px;
  font-weight: 400;
}

.toc-item i {
  color: #FFFFFF;
  display: inline-block;
  font-style: normal;
  width: 26px;
  min-width: 26px;
  background: var(--google-material-grey-600);
  border-radius: 50%;
  text-align: center;
  height: 26px;
  vertical-align: middle;
  line-height: 26px;
  margin-right: 8px;
}

.toc-item i::before,
.toc-item i::after {
  content: '';
  display: block;
  border-left: 1px solid var(--google-material-grey-600);
  border-right: 1px solid var(--google-material-grey-600);
  width: 0;
  height: 44px;
  z-index: 1;
  margin-top: 1px;
}

.toc-item i::before {
  margin-top: -44px;
  margin-left: 11px;
}

.toc-item i::after {
  margin-left: 11px;
}

.toc-item.completed {
  color: var(--google-material-grey-900);
}

.toc-item.completed i,
.toc-item.iron-selected i {
  background-color: var(--google-material-blue-600);
}

.toc-item.iron-selected {
  color: var(--google-material-grey-900);
  background-color: var(--google-material-grey-300);
  font-weight: 600;
}

.toc-item.completed i,
.toc-item.completed i::before,
.toc-item.completed i::after,
.toc-item.iron-selected i,
.toc-item.iron-selected i:before {
  border-color: var(--google-material-blue-600);
}

.toc-item:first-of-type i::before,
.toc-item:last-of-type i::after {
  display: none;
}

#metadata {
  color: var(--google-codelab-footer-text-color, #777);
  font-size: 0.7em;
  flex: 0 0 80px;
}

#feedback a {
  color: currentcolor;
}

@media (min-width: 641px) {
  :host(:not([theme="minimal"])) #pages {
    margin-top: 32px;
  }
  #controls {
    padding: 0 32px;
    bottom: 32px;
  }
}
